services:
  - type: web
    name: vidyutai-backend
    runtime: python
    region: mumbai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vidyutai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"

databases:
  - name: vidyutai-db
    databaseName: vidyutai
    plan: free
    region: mumbai
